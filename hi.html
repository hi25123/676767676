<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Realm of Fate</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c18;--bg2:#101828;--gold:#e8b830;--r0:#9099a0;--r1:#4a9eff;--r2:#b44aff;--r3:#ff7830;--r4:#ff2855}
html,body{height:100%;overflow:hidden;background:var(--bg);color:#eee;font-family:system-ui,sans-serif;user-select:none;touch-action:manipulation}
.S{display:none;width:100%;height:100%;position:absolute;top:0;left:0;flex-direction:column}.S.on{display:flex}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:rgba(0,0,0,.7);z-index:100;flex-shrink:0}
.lvb{background:linear-gradient(135deg,var(--gold),#b88a20);padding:4px 12px;border-radius:16px;font-weight:700;font-size:14px;cursor:pointer}
.cur{display:flex;gap:5px;flex-wrap:wrap}.ci{display:flex;align-items:center;gap:3px;font-weight:700;font-size:13px;background:rgba(255,255,255,.08);padding:3px 8px;border-radius:14px}
.cic{width:16px;height:16px;border-radius:50%;display:inline-block}
.cc{background:linear-gradient(135deg,#ffd700,#e8a000)}.cg{background:linear-gradient(135deg,#88f,#b44aff);cursor:pointer}.cd{background:linear-gradient(135deg,#e8b830,#fff)}.ct{background:linear-gradient(135deg,#ff69b4,#ff2855)}
.bnav{display:flex;justify-content:space-around;padding:3px 0 6px;background:rgba(0,0,0,.75);flex-shrink:0;z-index:100;border-top:1px solid rgba(255,255,255,.06)}
.nb{display:flex;flex-direction:column;align-items:center;background:none;border:none;color:rgba(255,255,255,.3);font-weight:700;font-size:10px;cursor:pointer;padding:3px 5px;border-radius:6px;gap:1px}.nb:hover,.nb.on{color:#fff;background:rgba(255,255,255,.1)}.nb i{font-size:18px;font-style:normal}
.stl{font-size:20px;font-weight:900;color:var(--gold);margin-bottom:8px}
.toast{position:fixed;top:40px;left:50%;transform:translateX(-50%);background:var(--gold);color:#080c18;padding:6px 16px;border-radius:10px;font-weight:700;font-size:13px;z-index:9999;animation:ti .2s,to .2s 1.4s forwards;white-space:nowrap}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%)}}
@keyframes to{to{opacity:0;transform:translateX(-50%) translateY(-10px)}}
/* GACHA */
.ginner{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:12px}
.gtitle{font-size:26px;font-weight:900;color:var(--gold)}.gsub{font-size:13px;color:rgba(255,255,255,.3)}
.gbanner{width:90%;max-width:400px;height:130px;border-radius:16px;background:linear-gradient(135deg,#182030,#281838,#101828);border:1px solid rgba(232,184,48,.2);display:flex;align-items:center;justify-content:center;gap:4px;overflow:hidden}
.gbanner span{font-size:28px;animation:bf 3s ease-in-out infinite}.gbanner span:nth-child(2n){animation-delay:-.8s}
@keyframes bf{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.gbtns{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.gb{border:none;padding:10px 16px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer}.gb:active{transform:scale(.94)}
.gb1{background:var(--gold);color:#080c18}.gb2{background:#f0d050;color:#080c18}.gb3{background:#b44aff;color:#fff}.gb4{background:#ff2855;color:#fff}
.gb small{font-size:10px;opacity:.6;display:block}
.pinfo{font-size:12px;color:rgba(255,255,255,.25)}
/* TEAM */
.tinner{flex:1;overflow-y:auto;padding:10px}
.frow{display:flex;gap:6px;margin-bottom:5px;align-items:center}
.flbl{font-size:12px;font-weight:700;color:rgba(255,255,255,.35);width:40px;text-align:right}
.tslot{width:68px;height:78px;border-radius:10px;border:2px dashed rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,.02);flex-shrink:0}
.tslot.f{border-style:solid;background:rgba(255,255,255,.04)}.tslot .e{font-size:28px}.tslot .n{font-size:9px;font-weight:800;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:rgba(0,0,0,.34);padding:1px 4px;border-radius:999px;margin-top:2px}.tslot.sel{box-shadow:0 0 0 2px var(--gold)}
.tbtns{display:flex;gap:6px;margin:8px 0}.tbtns button{padding:6px 14px;border-radius:8px;border:none;background:rgba(255,255,255,.06);color:var(--gold);font-weight:700;font-size:12px;cursor:pointer}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:6px}
.hc{display:flex;flex-direction:column;align-items:center;padding:6px 3px;border-radius:10px;border:2px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);cursor:pointer}.hc:active{transform:scale(.96)}.hc.it{border-color:var(--gold)!important}
.hc .e{font-size:26px}.hc .cn{font-size:9px;font-weight:800;text-align:center;background:rgba(0,0,0,.32);padding:1px 5px;border-radius:999px;max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.hc .cr{font-size:8px;font-weight:800;padding:1px 5px;border-radius:4px;margin-top:1px}.hc .cp{font-size:8px;color:rgba(255,255,255,.3)}
/* BATTLE */
.binner{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ssel{padding:10px;overflow-y:auto;flex:1}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:6px}
.sb{padding:8px;border-radius:10px;border:1px solid rgba(232,184,48,.12);background:rgba(232,184,48,.04);color:#fff;font-weight:700;font-size:12px;cursor:pointer;text-align:center}.sb:hover{border-color:var(--gold)}.sb.lk{opacity:.2;cursor:not-allowed}.sb .sn{font-size:18px;font-weight:900;color:var(--gold)}
.barena{flex:1;position:relative;display:none;flex-direction:column}.barena.on{display:flex}
.tbar{text-align:center;padding:5px;font-size:14px;font-weight:900;color:var(--gold);background:rgba(0,0,0,.5);flex-shrink:0}
.bf{flex:1;position:relative;overflow:hidden;background:linear-gradient(180deg,#080c18,#101828,#182838,#1a2840);max-width:760px;margin:0 auto;width:100%}
/* UNITS - BIG */
.uw{position:absolute;display:flex;flex-direction:column;align-items:center;z-index:10;transition:left .24s ease,top .24s ease}
.uw .ue{font-size:46px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.7));transition:transform .12s,filter .15s}
.uw.en .ue{transform:scaleX(-1)}
.uw .hpb{width:108px;height:16px;background:rgba(0,0,0,.72);border-radius:8px;overflow:hidden;position:relative;margin-top:4px;border:1px solid rgba(255,255,255,.18);box-shadow:0 0 0 1px rgba(255,255,255,.05) inset}
.uw .hpf,.uw .ohf,.uw .shf{position:absolute;left:0;top:0;height:100%;border-radius:7px;transition:width .3s}
.uw .hpf{background:linear-gradient(90deg,#0a9d5a,#8dff57)}.uw.en .hpf{background:linear-gradient(90deg,#ff5f5f,#ff1f5f)}
.uw .ohf{background:linear-gradient(90deg,#1cc8ff,#b7f3ff);opacity:.98;mix-blend-mode:screen}
.uw .shf{background:linear-gradient(90deg,#ffffff,#eef5ff);opacity:.96;box-shadow:0 0 10px rgba(255,255,255,.35)}
.uw .hpt{position:absolute;inset:0;text-align:center;font-size:9px;font-weight:800;line-height:16px;color:#fff;text-shadow:0 0 4px #000,0 1px 1px #000;padding:0 4px}
.uw .cb{width:108px;height:7px;background:rgba(0,0,0,.62);border-radius:4px;overflow:hidden;margin-top:3px}
.uw .cf{height:100%;border-radius:2px;transition:width .3s;background:#555}.uw .cf.sk{background:linear-gradient(90deg,#fd0,#fa0);box-shadow:0 0 3px rgba(255,215,0,.4)}.uw .cf.ul{background:linear-gradient(90deg,#fff,#fd0);box-shadow:0 0 5px rgba(255,255,255,.5)}
.uw .tfb{width:108px;height:6px;background:rgba(0,0,0,.45);border-radius:3px;overflow:hidden;margin-top:2px;display:none}
.uw .tfb.on{display:block}
.uw .tff{height:100%;border-radius:2px;transition:width .3s;background:linear-gradient(90deg,#ff6781,#ffc65d)}
.uw .un{font-size:10px;font-weight:800;text-shadow:0 1px 2px #000;white-space:nowrap;margin-top:3px;background:rgba(0,0,0,.4);padding:1px 6px;border-radius:999px;border:1px solid rgba(255,255,255,.08)}
.uw.dead{opacity:0;pointer-events:none;filter:grayscale(1)}.uw.act .ue{filter:drop-shadow(0 0 10px rgba(255,215,0,.6)) drop-shadow(0 2px 4px rgba(0,0,0,.7))}
.dn{position:absolute;pointer-events:none;z-index:60;animation:df .9s ease-out forwards;white-space:nowrap;font-weight:900}
.dn.ph{font-size:16px;color:#f44}.dn.cr{font-size:24px;color:#fd0;text-shadow:0 0 6px #f80}.dn.he{font-size:16px;color:#0e6}.dn.sk{font-size:20px;color:#b4f;text-shadow:0 0 5px #80d}.dn.ut{font-size:24px;color:#fd0;text-shadow:0 0 8px #fd0}.dn.sh{font-size:16px;color:#fff;text-shadow:0 0 5px rgba(180,220,255,.95)}
@keyframes df{0%{opacity:1;transform:translateY(0)}50%{opacity:1}100%{opacity:0;transform:translateY(-40px) scale(.7)}}
.sp{position:absolute;top:22%;left:50%;transform:translateX(-50%);font-size:16px;font-weight:900;pointer-events:none;z-index:55;animation:spp .8s ease-out forwards;white-space:nowrap;text-shadow:0 2px 6px rgba(0,0,0,.8)}
@keyframes spp{0%{opacity:0;transform:translateX(-50%) scale(.4)}15%{opacity:1;transform:translateX(-50%) scale(1.1)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-14px)}}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.bl{height:44px;background:rgba(0,0,0,.6);padding:4px 8px;overflow-y:auto;font-size:10px;color:rgba(255,255,255,.35);flex-shrink:0}.bl p{margin-bottom:1px}
.bc{display:flex;gap:5px;padding:6px 8px;background:rgba(0,0,0,.6);flex-shrink:0}
.bc button{flex:1;padding:6px;border-radius:8px;border:none;font-weight:700;font-size:12px;cursor:pointer}
.bau{background:#0e8;color:#080c18}.bau.on{background:var(--gold)}.bsp{background:rgba(255,255,255,.08);color:#fff}.bsk{background:rgba(232,184,48,.1);color:var(--gold)}.bre{background:rgba(255,60,60,.1);color:#f88}
/* MODES */
.mi{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px;align-items:center}
.mt{font-size:22px;font-weight:900;color:var(--gold);text-align:center}.mif{font-size:13px;color:rgba(255,255,255,.35);text-align:center}
.fb{background:var(--bg2);border-radius:14px;padding:12px;width:100%;max-width:380px;border:1px solid rgba(232,184,48,.1)}
.fn{font-size:22px;font-weight:900;color:var(--gold);text-align:center;margin-bottom:6px}
.ep{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.ec{display:flex;flex-direction:column;align-items:center;padding:5px;border-radius:8px;background:rgba(255,60,60,.06);border:1px solid rgba(255,60,60,.12);min-width:60px}
.ec .e{font-size:24px}.ec .s{font-size:9px;color:rgba(255,255,255,.4)}
.rp{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.rc{display:flex;flex-direction:column;align-items:center;padding:5px;border-radius:8px;background:rgba(232,184,48,.03);border:2px solid rgba(232,184,48,.1);cursor:pointer;min-width:56px}.rc:hover{border-color:var(--gold)}.rc.dd{opacity:.2;pointer-events:none}
.rc .e{font-size:22px}.rc .rn{font-size:8px;font-weight:700}.rc .rh{font-size:8px;color:rgba(255,255,255,.3)}
.mb{background:var(--gold);border:none;color:#080c18;padding:10px 26px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer}
/* SUMMON */
.sol{position:fixed;inset:0;z-index:1000;display:none;background:#000}.sol.on{display:block}
#sC{width:100%;height:100%;display:block}
.rb{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:10;text-align:center;transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .25s;opacity:0}.rb.show{transform:translate(-50%,-50%) scale(1);opacity:1}
.rb .re{font-size:76px}.rb .rn{font-size:22px;font-weight:900;margin-top:4px}.rb .rr{font-size:13px;font-weight:700;padding:3px 12px;border-radius:10px;display:inline-block;margin-top:4px}
.skb{position:absolute;bottom:22px;right:16px;z-index:20;background:rgba(255,255,255,.1);border:none;color:#fff;padding:7px 16px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer}
/* MULTI RESULTS - tap anywhere to close */
.mr{position:fixed;inset:0;z-index:1001;background:rgba(0,0,0,.93);display:none;flex-direction:column;align-items:center;justify-content:center;padding:10px;overflow-y:auto;cursor:pointer}.mr.on{display:flex}
.mg{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;max-width:420px}
.mc{display:flex;flex-direction:column;align-items:center;padding:6px 3px;border-radius:10px;border:2px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);animation:cp .25s cubic-bezier(.34,1.56,.64,1) both;cursor:pointer}
@keyframes cp{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
.mc .e{font-size:24px}.mc .nm{font-size:8px;font-weight:700;text-align:center}.mc .rk{font-size:7px;font-weight:800;padding:1px 4px;border-radius:3px}
/* REWARD */
.rwp{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:14px}.rwp.on{display:flex}
.rwp h2{font-size:26px;font-weight:900;color:var(--gold)}.rwi{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}.rwit{text-align:center;font-weight:700;font-size:15px}.rwit .ri{font-size:28px}
.rsbox{width:min(980px,100%);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;max-height:58vh;overflow:auto;display:none}
.rsbox.on{display:block}
.rsthead{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.rst{font-size:15px;font-weight:900;color:var(--gold)}
.rstsub{font-size:11px;color:rgba(255,255,255,.45);font-weight:700}
.rstabs{display:flex;gap:6px;flex-wrap:wrap}
.rstab{padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:rgba(255,255,255,.65);font-weight:800;font-size:12px;cursor:pointer}
.rstab.on{border-color:var(--gold);background:rgba(232,184,48,.12);color:var(--gold)}
.rstab.enemy.on{border-color:#ff6b6b;background:rgba(255,107,107,.12);color:#ff9d9d}
.rsteam{display:flex;flex-direction:column;gap:10px}
.rsteamhead{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
.rsteamtitle{font-size:15px;font-weight:900}
.rsteamtitle.enemy{color:#ff9d9d}
.rsteamtotals{display:flex;gap:8px;flex-wrap:wrap}
.rttl{padding:6px 10px;border-radius:10px;background:rgba(255,255,255,.05);font-size:11px;font-weight:800;color:rgba(255,255,255,.75)}
.rsgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px}
.rsrow{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:10px;display:flex;flex-direction:column;gap:9px}
.rsrow.enemy{border-color:rgba(255,107,107,.2);background:rgba(255,107,107,.05)}
.rsunit{display:flex;justify-content:space-between;align-items:center;gap:8px}
.rsname{display:flex;align-items:flex-start;gap:8px;font-weight:800}
.rsname span{font-size:22px}
.rsmeta{display:flex;flex-direction:column;gap:2px}
.rslv{font-size:10px;font-weight:800;color:rgba(255,255,255,.55)}
.rsstate{font-size:10px;font-weight:900;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.65)}
.rsstate.dead{background:rgba(255,90,90,.14);color:#ff9696}
.rstats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rstat{background:rgba(255,255,255,.04);border-radius:10px;padding:8px}
.rslbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.52);text-transform:uppercase;letter-spacing:.05em}
.rsval{display:flex;justify-content:space-between;align-items:baseline;gap:6px;margin-top:4px}
.rsnum{font-size:13px;font-weight:900}
.rspct{font-size:10px;font-weight:800;color:rgba(255,255,255,.5)}
.rsbar{height:7px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:6px}
.rsfill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold),#fff1a0)}
.rstat.atk .rslbl,.rstat.atk .rsnum{color:#ff6b6b}.rstat.atk .rsfill{background:linear-gradient(90deg,#ff5e5e,#ff9b9b)}
.rstat.heal .rslbl,.rstat.heal .rsnum{color:#6dff9c}.rstat.heal .rsfill{background:linear-gradient(90deg,#21d76b,#9bffbf)}
.rstat.shield .rslbl,.rstat.shield .rsnum{color:#f7f7f7}.rstat.shield .rsfill{background:linear-gradient(90deg,#cfcfcf,#ffffff)}
.rstat.taken .rslbl,.rstat.taken .rsnum{color:#72b7ff}.rstat.taken .rsfill{background:linear-gradient(90deg,#4a9eff,#9fd4ff)}
.rwok{background:var(--gold);border:none;color:#080c18;padding:10px 32px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer}
.rwghost{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#fff;padding:10px 24px;border-radius:12px;font-weight:800;font-size:14px;cursor:pointer}
.rst{font-size:14px;font-weight:800;color:var(--gold);margin-bottom:8px;text-align:center}
.rstable{display:grid;grid-template-columns:1.2fr repeat(4,1fr);gap:6px;font-size:11px;align-items:center}
.rsh{font-weight:800;color:rgba(255,255,255,.7);padding:4px 6px;background:rgba(255,255,255,.05);border-radius:8px;text-align:center}
.rsc{padding:5px 6px;background:rgba(255,255,255,.03);border-radius:8px;text-align:center}
.rsc.nm{text-align:left;font-weight:700;display:flex;align-items:center;gap:6px}
.rsc.nm span{font-size:18px}
.rwok{background:var(--gold);border:none;color:#080c18;padding:10px 32px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer}
/* ULT */
.up{position:fixed;inset:0;z-index:900;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.88);opacity:0;transition:opacity .25s}.up.on{display:flex;opacity:1}
.uinn{text-align:center;animation:uin .4s cubic-bezier(.34,1.56,.64,1)}.uinn .ue{font-size:80px}.uinn .un{font-size:22px;font-weight:900;margin-top:4px}.uinn .us{font-size:14px;color:rgba(255,255,255,.5)}
@keyframes uin{from{transform:scale(.2) translateY(30px);opacity:0}to{transform:scale(1);opacity:1}}
/* DETAIL MODAL */
.mbg{position:fixed;inset:0;z-index:950;background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;padding:8px}.mbg.on{display:flex}
.db{background:var(--bg2);border-radius:16px;padding:14px;width:100%;max-width:760px;max-height:94vh;overflow-y:auto;border:1px solid rgba(232,184,48,.12)}
.dh{text-align:center;margin-bottom:8px}.dh .de{font-size:56px}.dh .dhn{font-size:18px;font-weight:900}.dh .dr{font-size:12px;font-weight:700;padding:3px 10px;border-radius:8px;display:inline-block;margin-top:3px}.dh .dp{font-size:14px;color:var(--gold);font-weight:700;margin-top:4px}
.dlv{text-align:center;margin:6px 0;padding:8px;background:rgba(255,255,255,.03);border-radius:10px}
.dlv .ln{font-size:15px;font-weight:700}.dlv .lb{width:100%;height:5px;background:rgba(255,255,255,.08);border-radius:3px;margin:3px 0;overflow:hidden}.dlv .lf{height:100%;background:var(--gold);border-radius:3px}
.dlv .li{font-size:10px;color:rgba(255,255,255,.3)}
.lbs{display:flex;gap:5px;justify-content:center;margin-top:5px}
.lbs button{padding:5px 12px;border-radius:6px;border:none;background:rgba(232,184,48,.12);color:var(--gold);font-weight:700;font-size:12px;cursor:pointer}.lbs button:disabled{opacity:.25}
.dstars{text-align:center;font-size:13px;color:var(--gold);margin:5px 0}
.dsts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin:8px 0;text-align:center}

function pull(n){const costs={1:30,10:270,100:2500,1000:22e3,10000:200000};if(G.gems<costs[n]){toast("Not enough!");return;}G.gems-=costs[n];const res=[];for(let i=0;i<n;i++){let rk;const last=i===n-1;if(n===10000&&last)rk=4;else if(n===1000&&last)rk=Math.random()<.5?4:3;else{const g=(n>=100&&last)?true:(n>=10&&last&&!res.some(r=>r.r>=2));rk=rollR(g);if(n===100&&last&&rk<2)rk=2;}const pool=DB.filter(x=>x.r===rk);res.push(pool.length?{...pool[~~(Math.random()*pool.length)]}:{...DB[0]});}
  res.forEach(c=>{G.copies[c.id]=(G.copies[c.id]||0)+1;if(!G.coll.find(x=>x.id===c.id)){const h={...c,stars:0,level:1};G.coll.push(h);for(let s=0;s<5;s++)if(!G.team[s]){G.team[s]=h;break;}}});upUI();if(n<=10)playSm(res);else showMR(res);}

    if(t>=maxF&&!sDone){sDone=1;finR(ck);}if(t<maxF+60)sRAF=requestAnimationFrame(draw);else{clSm();sI++;if(sI<sQ.length)setTimeout(nxtSm,60);else{upUI();if(sQ.length>1)showMR(sQ);}}}sRAF=requestAnimationFrame(draw);

function gearPDesc(gP){const d={'cr':'+ crit chance','gBurn':'attacks apply burn','nth':'every Nth attack +50% dmg','pen':'ignore DEF','hiHp':'+dmg to >70% HP','tnkDmg':'+dmg to tanks+splash','killAtk':'+ATK on kill(3x stack)','splash':'attacks splash to all','instaKill':'instant-kill chance','flatDR':'reduced damage taken','slow':'attackers slowed','deathDmg':'on death deal %HP','startShield':'start with shield','ls':'lifesteal','autoRevive':'auto-revive once','drReflect':'DR+reflect','shieldRegen':'shield regen/turn','regen':'HP regen/turn','skDmg':'+skill damage','ultDmg':'+ult damage','allStats':'+all stats','dblStrike':'double-strike chance','teamAtk':'team +ATK'};return(d[gP.t]||gP.t)+' '+(gP.v*100).toFixed(0)+'%';}
function gearUsedCount(gid){let used=0;Object.values(G.hG||{}).forEach(slots=>{slots=normalizeGearSlots(slots);if(!slots)return;EQUIP_SLOTS.forEach(sl=>{if(slots[sl]===gid)used++;});});return used;}
function gearFreeCount(gid,hid,slT){const own=G.gI[gid]||0;let used=gearUsedCount(gid);const slots=normalizeGearSlots(G.hG[hid]||{});if(hid!==undefined&&slT&&slots[slT]===gid)used--;return Math.max(0,own-used);}

function rTr(id){if(G.tok<1)return;const cur=G.hT[id];if(cur!==undefined){const ct=TRAITS[cur];if(ct&&ct.t>=3){cfm('⚠️ You have a '+TRN[ct.t]+' trait! Reroll anyway?',()=>{doRTr(id);});return;}}doRTr(id);}

function mkEn(stg,idx,mode){
  const pool=mode==='story'?DB.filter(x=>x.r<=storyEnemyCap(stg)):DB;
  const pick={...(pool[(idx+stg+~~(Math.random()*pool.length))%pool.length]||DB[0])};
  const lv=Math.min(500,Math.max(1,mode==='story'?5+stg*2:15+stg*2));
  const stars=Math.min(10,mode==='story'?~~(stg/25):~~(stg/20));

async function aDmg(atk,tgt,m,cr,isSk,type){
  if(!tgt||!tgt.alive)return;
  if(tgt.pT==='dg'&&Math.random()<tgt.pV){blog(tgt.n+' dodged!');return;}
  if(tgt.pT==='cd'&&Math.random()<tgt.pV){blog(tgt.n+' counter!');if(atk.alive)await aDmg(tgt,atk,1,0,0,'ph');return;}
  if((atk.pT==='er'&&Math.random()<atk.pV)||(gearHas(atk,'instaKill')&&Math.random()<gearValue(atk,'instaKill'))){tgt.hp=0;tgt.alive=0;uHP(tgt);showDN(tgt,'ERASED','ut');shk();return;}
  let dmg=~~(atk.a*m*COMBAT.damageScale*(.88+Math.random()*.24)*(cr?1.8:1));
  if(isSk&&gearHas(atk,'skDmg'))dmg=~~(dmg*(1+gearValue(atk,'skDmg')));
  if(type==='ut'&&gearHas(atk,'ultDmg'))dmg=~~(dmg*(1+gearValue(atk,'ultDmg')));
  if(atk.pT==='eb'&&tgt.hp<tgt.maxHp*.4)dmg=~~(dmg*(1+atk.pV));
  if((hasStatus(tgt,'mark')||hasStatus(tgt,'doomMark'))&&type!=='sh')dmg=~~(dmg*(1+((tgt.efx.find(e=>e.t==='doomMark'&&e.dur>0)?.v)||(tgt.efx.find(e=>e.t==='mark'&&e.dur>0)?.v)||0)));
  if((atk.pT==='ob'||atk.pT==='absX')&&tgt.hp>0&&tgt.hp<tgt.maxHp*atk.pV){tgt.hp=0;tgt.alive=0;uHP(tgt);showDN(tgt,'☠','ut');shk();return;}
  let shieldBlocked=0;let bonusBlocked=0;
  if(tgt.shield>0&&atk.pT!=='gz'&&!gearHas(atk,'pen')){const ab=Math.min(tgt.shield,dmg);tgt.shield-=ab;dmg-=ab;shieldBlocked=ab;}
  if(dmg>0&&tgt.bonusHp>0){const ab=Math.min(tgt.bonusHp,dmg);tgt.bonusHp-=ab;dmg-=ab;bonusBlocked=ab;}
  if(tgt.pT==='dr'||tgt.pT==='dr2')dmg=~~(dmg*(1-tgt.pV));
  if(gearHas(tgt,'flatDR'))dmg=~~(dmg*(1-gearValue(tgt,'flatDR')));
  if(tgt.pT==='ut'&&Math.random()<tgt.pV){atk.a=~~(atk.a*.8);}
  if(tgt.pT==='eventHorizon'){atk.hp=Math.max(1,atk.hp-~~(atk.maxHp*tgt.pV));uHP(atk);}
  tgt.hp-=dmg;
  atk.dmgDealt=(atk.dmgDealt||0)+Math.max(0,dmg+shieldBlocked+bonusBlocked);
  tgt.dmgTaken=(tgt.dmgTaken||0)+Math.max(0,dmg+bonusBlocked);
  tgt.blocked=(tgt.blocked||0)+Math.max(0,shieldBlocked);
  if(tgt.hp<=0&&tgt.pT==='en'&&!tgt.endured){tgt.hp=1;tgt.endured=1;}
  if(tgt.hp<=0&&(tgt.pT==='dl'||tgt.pT==='dl2')&&!tgt.dl_used&&canRevive(tgt)){tgt.dl_used=1;tgt.hp=~~(tgt.maxHp*(tgt.pV||.45));tgt.alive=1;tgt.shield=~~(tgt.maxHp*.25);if(tgt.pT!=='dl2')markFinalLife(tgt);}
  if(tgt.hp<=0&&tgt.pT==='dl2'&&tgt.dl_used&&tgt.dl2_revives<2){tgt.dl2_revives++;tgt.hp=~~(tgt.maxHp*0.4);tgt.alive=1;tgt.shield=~~(tgt.maxHp*.2);if(tgt.dl2_revives>=2&&!tgt.transformed)await awaken(tgt);}
  if(tgt.hp<=0&&tgt.pT==='phx'&&!tgt.phx_used){tgt.phx_used=1;tgt.hp=~~(tgt.maxHp*.50);tgt.alive=1;tgt.a=~~(tgt.a*1.3);blog('🔥 '+tgt.n+' REBORN!');}
  if(tgt.hp<=0&&tgt.tfImmune>0){tgt.hp=1;}
  if(tgt.hp<=0){tgt.hp=0;tgt.alive=0;if(tgt.pT==='bloodTide')spreadStatusOnDeath(tgt,'bleed');}
  uHP(tgt);showDN(tgt,dmg>0?dmg:(shieldBlocked+bonusBlocked),dmg>0?(cr?'cr':type):'sh');
  const el=gU(tgt);if(el){const te=el.querySelector('.ue');if(te){const base=tgt.side==='e'?'scaleX(-1)':'';te.style.transform=base+' scale(1.2)';te.style.filter='brightness(2)';setTimeout(()=>{te.style.transform=base;te.style.filter='drop-shadow(0 2px 4px rgba(0,0,0,.7))';},120);}}
  if(cr||type==='ut')shk();
  if((tgt.pT==='cd'||gearHas(tgt,'drReflect'))&&dmg>0&&atk.alive){const ref=gearHas(tgt,'drReflect')?gearValue(tgt,'drReflect'):0;if(ref>0){atk.hp=Math.max(1,atk.hp-~~(dmg*ref));uHP(atk);showDN(atk,~~(dmg*ref),'ph');}}
  if(tgt.alive){grantHitCharge(tgt);} 
  if(!tgt.alive){if(gearHas(tgt,'deathDmg')&&atk.alive){const blast=~~(atk.maxHp*gearValue(tgt,'deathDmg'));atk.hp=Math.max(1,atk.hp-blast);uHP(atk);showDN(atk,blast,'ph');}atk.kills=(atk.kills||0)+1;grantTransform(atk,10);if(gearHas(atk,'killAtk'))atk.a=~~(atk.a*(1+Math.min(.3,gearValue(atk,'killAtk'))));if(atk.pT==='co')atk.charge=Math.max(atk.charge||0,50);if(atk.pT==='worldEnder'){atk.a=~~(atk.a*1.15);atk.charge=Math.min(100,(atk.charge||0)+25);if(atk.kills%3===0)atk.charge=100;}blog('💀 '+tgt.n);}await sl(bd()*.04);}

function tFight(){if(!G.tR)return;const hp={};G.tR.forEach(h=>hp[h.id]=h._hp!==undefined?h._hp:getSt(h).hp);G.curM='tower';if(!G.skipBattle){document.querySelectorAll('.S').forEach(s=>s.classList.remove('on'));$('Sbattle').classList.add('on');$('SS').style.display='none';$('BA').classList.add('on');}startB(G.tF,'tower',G.tR,hp);}

// SHOP
function rShop(){const c=$('SI');let h=`<div class="mt">🏪 Shop</div><div class="stabs"><div class="stab${G.sT===0?' on':''}" onclick="G.sT=0;rShop()">⚔️ Gear</div><div class="stab${G.sT===1?' on':''}" onclick="G.sT=1;rShop()">🎲 Tokens</div><div class="stab${G.sT===2?' on':''}" onclick="G.sT=2;rShop()">👤 Shards</div></div>`;
  if(G.sT===0)GEAR.forEach(g=>{const mx=~~(G.coins/g.price)||0;h+=`<div class="si"><div class="sic">${g.e}</div><div class="sin"><div class="sinm" style="color:${RC[g.r]}">${g.n}</div><div class="sid">+${g.atk}ATK +${g.hp}HP${g.gP?' · '+gearPDesc(g.gP):''}</div></div><div style="display:flex;gap:3px;align-items:center"><button style="padding:3px 8px;border:none;border-radius:4px;background:var(--gold);color:#080c18;font-weight:700;font-size:11px;cursor:pointer" onclick="bGear(${g.id})">×1</button>${mx>=10?`<button style="padding:3px 8px;border:none;border-radius:4px;background:rgba(232,184,48,.3);color:var(--gold);font-weight:700;font-size:11px;cursor:pointer" onclick="bGearN(${g.id},10)">×10</button>`:''}<button style="padding:3px 8px;border:none;border-radius:4px;background:rgba(232,184,48,.15);color:var(--gold);font-weight:700;font-size:11px;cursor:pointer" onclick="bGearN(${g.id},${mx})">MAX(${mx})</button><span style="font-size:10px;color:var(--gold);white-space:nowrap">${g.price.toLocaleString()}🪙</span></div></div>`;});
  else if(G.sT===1){const mxT=~~(G.gems/50)||0;const mxD=~~(G.gems/100)||0;h+=`<div class="si"><div class="sic">🎲</div><div class="sin"><div class="sinm">Tokens</div><div class="sid">50💎 each</div></div><div style="display:flex;gap:3px;align-items:center"><button style="padding:3px 8px;border:none;border-radius:4px;background:var(--gold);color:#080c18;font-weight:700;font-size:11px;cursor:pointer" onclick="bTok(1,50)">×1</button><button style="padding:3px 8px;border:none;border-radius:4px;background:rgba(232,184,48,.3);color:var(--gold);font-weight:700;font-size:11px;cursor:pointer" onclick="bTok(10,500)">×10</button><button style="padding:3px 8px;border:none;border-radius:4px;background:rgba(232,184,48,.15);color:var(--gold);font-weight:700;font-size:11px;cursor:pointer" onclick="bTok(${mxT},${mxT*50})">MAX(${mxT})</button></div></div>`;
    h+=`<div class="si"><div class="sic">✨</div><div class="sin"><div class="sinm">Dust ×1000</div><div class="sid">100💎 each</div></div><div style="display:flex;gap:3px;align-items:center"><button style="padding:3px 8px;border:none;border-radius:4px;background:var(--gold);color:#080c18;font-weight:700;font-size:11px;cursor:pointer" onclick="bDust()">×1</button><button style="padding:3px 8px;border:none;border-radius:4px;background:rgba(232,184,48,.15);color:var(--gold);font-weight:700;font-size:11px;cursor:pointer" onclick="bDustN(${mxD})">MAX(${mxD})</button></div></div>`;}
  else DB.filter(d=>d.r>=2).forEach(d=>{const pr=d.r===2?5000:d.r===3?25000:100000;const mx=~~(G.coins/pr)||0;h+=`<div class="si"><div class="sic">${d.e}</div><div class="sin"><div class="sinm" style="color:${RC[d.r]}">${d.n}</div><div class="sid">${RN[d.r]} · ${pr.toLocaleString()}🪙</div></div><div style="display:flex;gap:3px;align-items:center"><button style="padding:3px 8px;border:none;border-radius:4px;background:var(--gold);color:#080c18;font-weight:700;font-size:11px;cursor:pointer" onclick="bShard(${d.id})">×1</button>${mx>=10?`<button style="padding:3px 8px;border:none;border-radius:4px;background:rgba(232,184,48,.3);color:var(--gold);font-weight:700;font-size:11px;cursor:pointer" onclick="bShardN(${d.id},10)">×10</button>`:''}<button style="padding:3px 8px;border:none;border-radius:4px;background:rgba(232,184,48,.15);color:var(--gold);font-weight:700;font-size:11px;cursor:pointer" onclick="bShardN(${d.id},${mx})">MAX(${mx})</button></div></div>`;});
  c.innerHTML=h;}
function bGear(id){if(G.coins<GEAR[id].price){toast("Not enough!");return;}G.coins-=GEAR[id].price;G.gI[id]=(G.gI[id]||0)+1;upUI();toast('Got '+GEAR[id].n);rShop();}
function bGearN(id,n){if(n<=0){toast("Not enough!");return;}for(let i=0;i<n;i++){if(G.coins<GEAR[id].price)break;G.coins-=GEAR[id].price;G.gI[id]=(G.gI[id]||0)+1;}upUI();toast('Got '+n+'× '+GEAR[id].n);rShop();}
function bTok(n,cost){if(G.gems<cost){toast("Not enough!");return;}G.gems-=cost;G.tok+=n;upUI();toast('+'+n+' tokens');rShop();}
function bDust(){if(G.gems<100){toast("Not enough!");return;}G.gems-=100;G.dust+=1e3;upUI();toast('+1000 dust');rShop();}
function bDustN(n){if(n<=0){toast("Not enough!");return;}for(let i=0;i<n;i++){if(G.gems<100)break;G.gems-=100;G.dust+=1e3;}upUI();toast('+'+n+'k dust');rShop();}
function bShard(id){const d=DB.find(x=>x.id===id);if(!d)return;const pr=d.r===2?5000:d.r===3?25000:100000;if(G.coins<pr){toast("Not enough!");return;}G.coins-=pr;G.copies[id]=(G.copies[id]||0)+1;if(!G.coll.find(x=>x.id===id))G.coll.push({...d,stars:0,level:1});upUI();toast('+1 '+d.n);rShop();}
function bShardN(id,n){const d=DB.find(x=>x.id===id);if(!d||n<=0)return;const pr=d.r===2?5000:d.r===3?25000:100000;for(let i=0;i<n;i++){if(G.coins<pr)break;G.coins-=pr;G.copies[id]=(G.copies[id]||0)+1;if(!G.coll.find(x=>x.id===id))G.coll.push({...d,stars:0,level:1});}upUI();toast('+'+n+' '+d.n);rShop();}

// ARENA
function rArena(){const c=$('AI');const ops=[];for(let i=0;i<5;i++){const rk=arenaOpponentRank(G.aR,i);const team=mkArenaTeam(rk);const pf=arenaProfile(rk);const p=team.reduce((s,h)=>s+pwr(h),0);ops.push({nm:['ShadowKing','DragonLord','VoidMaster','StarSlayer','FateBreaker'][i],p,rk,team,pf});}
  let h=`<div class="mt">🏟️ Arena</div><div class="mif">Rank #${G.aR.toLocaleString()} · Wins: ${G.aW}</div><div style="display:flex;justify-content:center;margin:8px 0">${skipBattleMarkup()}</div><div class="fb">`;
  ops.forEach((o,i)=>{h+=`<div class="si" onclick="aFight(${i})"><div class="sic">👤</div><div class="sin"><div class="sinm">${o.nm}</div><div class="sid">Rank #${o.rk.toLocaleString()} · Lv${o.pf.level} · ★${o.pf.stars} · ⚡${o.p.toLocaleString()}</div><div class="sid">${o.team.map(t=>t.e).join(' ')} · ${RN[o.pf.maxR]} cap</div></div><div class="sip">Fight</div></div>`;});
  G.aOps=ops;
  c.innerHTML=h+'</div>';}
function aFight(i){const op=G.aOps?.[i];if(!op)return;G.aOpp=op.team.map((u,idx)=>({...u,idx,side:'e'}));G.aMeta=op;G.curM='arena';if(!G.skipBattle){document.querySelectorAll('.S').forEach(s=>s.classList.remove('on'));$('Sbattle').classList.add('on');$('SS').style.display='none';$('BA').classList.add('on');}startB(Math.max(1,~~(op.rk/50000)+25),'arena',G.team.filter(Boolean));}

// CHEATS
$('GB').addEventListener('click',e=>{e.stopPropagation();G.s1++;if(G.s1>=10){G.coins+=9999999999;G.gems+=9999999999;G.dust+=999999999;G.tok+=9999999;G.s1=0;upUI();toast("🌟 Infinite Wealth!");}setTimeout(()=>G.s1=0,3000);});
$('LVB').addEventListener('click',e=>{e.stopPropagation();G.s2++;if(G.s2>=10){G.s2=0;DB.forEach(d=>{G.copies[d.id]=(G.copies[d.id]||0)+999;if(!G.coll.find(x=>x.id===d.id))G.coll.push({...d,stars:10,level:500});else{const h=G.coll.find(x=>x.id===d.id);h.stars=10;h.level=500;}});GEAR.forEach(g=>G.gI[g.id]=(G.gI[g.id]||0)+10);G.maxStage=G.stageCap;G.lv=500;const best=[...G.coll].sort((a,b)=>b.r-a.r);for(let i=0;i<5;i++)G.team[i]=best[i]||null;upUI();toast("🌟 DEV MODE!");}setTimeout(()=>G.s2=0,3000);});

// INIT
(function(){[0,2,3].forEach((id,i)=>{const c={...DB[id],stars:0,level:1};G.coll.push(c);G.copies[id]=1;G.team[i]=c;});
  const feat=DB.filter(c=>c.r>=4);const picks=[];while(picks.length<6&&feat.length>picks.length){const i=~~(Math.random()*feat.length);if(!picks.find(p=>p.id===feat[i].id))picks.push(feat[i]);}
  $('BAN').innerHTML=picks.map(c=>`<span>${c.e}</span>`).join('');upUI();})();
</script></body></html>
