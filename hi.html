function maxLv(s){return 50+(s||0)*45;}
function getSt(h){const lv=h.level||1,s=h.stars||0;const lM=1+(lv-1)*.006+Math.pow(lv-1,2)*8e-6;const sM=1+s*.12;
  const tot=lM*sM;let atk=~~(h.a*tot),hp=~~(h.hp*tot),spd=h.sp+~~(lv/80);
  const g=G.hG[h.id]||{};['w','a','c'].forEach(sl=>{const gid=g[sl];if(gid!==undefined&&GEAR[gid]){atk+=GEAR[gid].atk;hp+=GEAR[gid].hp;spd+=GEAR[gid].sp;}});
  const tr=G.hT[h.id];if(tr!==undefined){const t=TRAITS[tr];if(t.s==='a')atk=~~(atk*(1+t.v));else if(t.s==='h')hp=~~(hp*(1+t.v));else if(t.s==='*'||t.s==='M'){atk=~~(atk*(1+t.v));hp=~~(hp*(1+t.v));}}
  return{hp,atk,spd};}
function pwr(h){const s=getSt(h);return ~~(s.atk*2+s.hp+s.spd*10+(h.stars||0)*500+(h.level||1)*20+h.r*1000);}
function sCost(r,s){return ~~(2*Math.pow(1.5,s)*(1+r*.3));}

function rollR(g){G.pity++;G.megaP++;if(G.megaP>=300){G.megaP=0;G.pity=0;return 4;}if(G.pity>=80){G.pity=0;return Math.random()<.2?4:3;}if(g){const r=Math.random()*100;return r<1?4:r<6?3:r<20?2:r<50?1:0;}const r=Math.random()*100;let c=0;for(let i=0;i<RW.length;i++){c+=RW[i];if(r<c)return i;}return 0;}
function pull(n){const costs={1:30,10:270,100:2500,1000:22e3,10000:200000};if(G.gems<costs[n]){toast("Not enough!");return;}G.gems-=costs[n];const res=[];for(let i=0;i<n;i++){let rk;if(n>=10000&&i===n-1&&!res.some(r=>r.r>=4)){rk=4;}else if(n>=1000&&i===n-1&&!res.some(r=>r.r>=3)){rk=Math.random()<.2?4:3;}else{const g=n>=10&&i===n-1&&!res.some(r=>r.r>=2);rk=rollR(g);}const pool=DB.filter(x=>x.r===rk);res.push(pool.length?{...pool[~~(Math.random()*pool.length)]}:{...DB[0]});}
  res.forEach(c=>{G.copies[c.id]=(G.copies[c.id]||0)+1;if(!G.coll.find(x=>x.id===c.id)){const h={...c,stars:0,level:1};G.coll.push(h);for(let s=0;s<5;s++)if(!G.team[s]){G.team[s]=h;break;}}});upUI();if(n<=10)playSm(res);else showMR(res);}

const sOL=$('SOL'),sC=$('sC'),ctx=sC.getContext('2d');let sRAF,sSkip=0,sDone=0,sQ=[],sI=0;
function playSm(res){sQ=res;sI=0;nxtSm();}
function nxtSm(){if(sI>=sQ.length){upUI();return;}const ck=sQ[sI];sSkip=sDone=0;sOL.classList.add('on');sC.width=innerWidth;sC.height=innerHeight;$('SKB').style.display=ck.r>=4?'none':'block';
  const col=RC[ck.r]||'#888';const maxF=Math.min(50+ck.r*18,220);let t=0;const cx=sC.width/2,cy=sC.height/2;const pts=[];
  function draw(){if(sSkip){finR(ck);return;}t++;ctx.clearRect(0,0,sC.width,sC.height);ctx.fillStyle='#000';ctx.fillRect(0,0,sC.width,sC.height);const p=Math.min(t/maxF,1);ctx.globalAlpha=1;
    for(let i=0;i<6+ck.r*2;i++){const a=(i/(6+ck.r*2))*Math.PI*2+t*(.02+ck.r*.005);const r2=(100+ck.r*8)*(1-p);ctx.beginPath();ctx.arc(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2,2+p*(3+ck.r),0,Math.PI*2);ctx.fillStyle=col;ctx.globalAlpha=.3+p*.7;ctx.fill();}
    if(ck.r>=3){const g=ctx.createRadialGradient(cx,cy,0,cx,cy,50+p*80);g.addColorStop(0,col+'44');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.globalAlpha=.3;ctx.fillRect(0,0,sC.width,sC.height);}
    if(ck.r>=4&&t<maxF*.6){if(t>maxF*.3){ctx.globalAlpha=(t-maxF*.3)/(maxF*.3);ctx.fillStyle='#f00';ctx.shadowColor='#f00';ctx.shadowBlur=20;ctx.beginPath();ctx.arc(cx-30,cy-20,8,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+30,cy-20,8,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}}
    ctx.globalAlpha=1;if(t>maxF*.4&&t%3===0)pts.push({x:cx,y:cy,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,l:25,s:1+Math.random()*2});
    for(let i=pts.length-1;i>=0;i--){const q=pts[i];q.x+=q.vx;q.y+=q.vy;q.l--;ctx.beginPath();ctx.arc(q.x,q.y,q.s*Math.max(0,q.l/25),0,Math.PI*2);ctx.fillStyle=col;ctx.globalAlpha=q.l/25*.5;ctx.fill();if(q.l<=0)pts.splice(i,1);}ctx.globalAlpha=1;
    if(t>=maxF&&!sDone){sDone=1;finR(ck);}if(t<maxF+60)sRAF=requestAnimationFrame(draw);else{clSm();sI++;if(sI<sQ.length)setTimeout(nxtSm,60);else{upUI();if(sQ.length>1)showMR(sQ);}}}sRAF=requestAnimationFrame(draw);
  if(ck.r<4)sOL.ondblclick=()=>{skPull();sOL.ondblclick=null;};}
function finR(ck){sDone=1;const b=$('RB');b.innerHTML=`<div class="re">${ck.e}</div><div class="rn" style="color:${RC[ck.r]}">${ck.n}</div><div class="rr r${ck.r}">${RN[ck.r]}</div>`;b.classList.add('show');}
function skPull(){if(sQ[sI]&&sQ[sI].r>=4)return;sSkip=1;clSm();sI++;if(sI<sQ.length)setTimeout(nxtSm,30);else{upUI();if(sQ.length>1)showMR(sQ);}}

function showMR(res){res.sort((a,b)=>a.r-b.r);const g=$('MG');g.innerHTML='';
  if(res.length>50){const ct={};res.forEach(c=>ct[c.r]=(ct[c.r]||0)+1);g.style.gridTemplateColumns='1fr';let h='';for(let i=4;i>=0;i--)if(ct[i])h+=`<div style="color:${RC[i]};font-size:15px;padding:3px">${RN[i]}: ×${ct[i]}</div>`;g.innerHTML=h;}
  else{g.style.gridTemplateColumns='repeat(5,1fr)';res.forEach((c,i)=>{const d=document.createElement('div');d.className='mc b'+c.r;d.style.animationDelay=i*.03+'s';d.innerHTML=`<div class="e">${c.e}</div><div class="nm">${c.n}</div><div class="rk r${c.r}">${RN[c.r]}</div>`;d.onclick=e=>{e.stopPropagation();openD(c.id);};g.appendChild(d);});}
  $('MR').classList.add('on');}

function mkEn(stg,idx,mode){
  let r=0;
  if(mode==='story'){if(stg<=10)r=Math.random()<.7?0:1;else if(stg<=25)r=Math.random()<.5?1:2;else if(stg<=50)r=2;else if(stg<=75)r=3;else r=Math.random()<.5?3:4;}
  else if(mode==='tower'){if(stg<=20)r=Math.random()<.5?0:1;else if(stg<=50)r=Math.random()<.5?1:2;else if(stg<=80)r=Math.random()<.5?2:3;else r=Math.random()<.7?3:4;}
  else{r=Math.min(4,~~(stg/25));}
  const pool=DB.filter(x=>x.r===r);
  const base=pool[~~(Math.random()*pool.length)]||DB[0];
  let sm;
  if(mode==='story')sm=1+stg*0.35;
  else if(mode==='dungeon'){let m=1+stg*0.15;if(stg>=75)m*=Math.pow(1.15,stg-74);if(stg>=90)m*=Math.pow(1.18,stg-89);sm=m;}
  else sm=1+stg*0.10;
  const bSt=getSt({...base,level:1,stars:0});
  let hp=~~(bSt.hp*sm),atk=~~(bSt.atk*sm),spd=bSt.spd+~~(stg*.2);
  if(mode==='story'&&stg%10===0&&idx===0){hp*=2;atk=~~(atk*1.5);}
  if(mode==='tower'&&stg%25===0&&idx===0){hp*=2;atk=~~(atk*1.5);}
  if(mode==='dungeon'&&stg%25===0){hp*=2;atk=~~(atk*2);}
  return{...base,hp,maxHp:hp,a:atk,sp:spd,alive:1,side:'e',idx,charge:base.sc||0,efx:[],endured:0,dl_used:0,dl2_revives:0,har_revives:0,phx_used:0,tc:0,stS:0,pact_used:0,oc_count:0,fw_copied:false,fw_pT:null,row:idx<2?'front':'back',id:-(idx+1)*1000-base.id};}

function startB(stg,mode,roster,php,customEns){
  let team=roster||G.team.filter(Boolean);if(!team.length){toast("Set team!");return;}
  $('SS').style.display='none';$('BA').classList.add('on');$('BL').innerHTML='';
  let cnt;if(mode==='story')cnt=Math.min(2+~~(stg/20),5);else if(mode==='dungeon')cnt=stg%25===0?3:stg%5===0?2:1;else cnt=Math.min(2+~~(stg/15),5);
  const ens=customEns||(()=>{const a=[];for(let i=0;i<cnt;i++)a.push(mkEn(stg,i,mode));return a;})();
  const als=team.map((c,i)=>{const s=getSt(c);return{...c,...s,hp:php&&php[c.id]!==undefined?php[c.id]:s.hp,maxHp:s.hp,a:s.atk,sp:s.spd,alive:1,side:'a',idx:i,charge:c.sc||0,efx:[],endured:0,dl_used:0,dl2_revives:0,har_revives:0,phx_used:0,tc:0,stS:0,row:i<2?'front':'back',pact_used:0,oc_count:0,fw_copied:false,fw_pT:null};});
  als.forEach(u=>{if(u.hp<=0){u.alive=0;u.hp=0;}});
  als.filter(u=>u.alive).forEach(u=>{if(u.pT==='bs'){als.filter(f=>f.alive).forEach(f=>{f.a=~~(f.a*(1+u.pV));f.maxHp=~~(f.maxHp*(1+u.pV));f.hp=Math.min(f.maxHp,~~(f.hp*(1+u.pV)));});}if(u.pT==='cos'){als.filter(f=>f.alive).forEach(f=>{f.a=~~(f.a*(1+u.pV));f.maxHp=~~(f.maxHp*(1+u.pV));f.hp=Math.min(f.maxHp,~~(f.hp*(1+u.pV)));});}});
  B={stg,mode,als,ens,done:0,tQ:[],ti:0};bQ();plU();blog(`⚔️ ${mode==='story'?'Stage':'Floor'} ${stg}`);rTurns();}
function bQ(){if(!B)return;const all=[...B.als.filter(u=>u.alive),...B.ens.filter(u=>u.alive)];all.sort((a,b)=>b.sp-a.sp||(Math.random()-.5));B.tQ=all;B.ti=0;}

function plU(){BF2().querySelectorAll('.uw,.dn,.sp').forEach(e=>e.remove());const fw=Math.min(BF2().offsetWidth,600),fh=BF2().offsetHeight;

    const p=uPos(u,fw,fh);d.style.left=p.x+'px';d.style.top=p.y+'px';BF2().appendChild(d);});}

function uPos(u,fw,fh){

function uCH(u){const el=gU(u);if(!el)return;const c=Math.min(u.charge||0,100);const b=el.querySelector('.cf');b.style.width=c+'%';b.className='cf'+(c>=100?' ul':c>=50?' sk':'');}

async function rTurns(){
  while(B&&!B.done){if(B.ti>=B.tQ.length)bQ();const u=B.tQ[B.ti];B.ti++;if(!u||!u.alive)continue;
    if(!B.ens.some(e=>e.alive)){winB();return;}if(!B.als.some(a=>a.alive)){loseB();return;}
    const el=gU(u);if(el)el.classList.add('act');$('TB').textContent=u.e+' '+u.n;$('TB').style.color=u.side==='a'?'var(--gold)':'#f55';
    u.tc++;u.charge=Math.min(100,(u.charge||0)+3);
    if(u.bonusHp>0){u.bonusHp=~~(u.bonusHp*.9);if(u.bonusHp<1)u.bonusHp=0;}
    if(u.pT==='tsh'&&u.alive)u.shield=(u.shield||0)+~~(u.maxHp*u.pV);
    if(TRANSFORM_IDS.includes(u.id)&&!u.transformed){u.tfBar=(u.tfBar||0)+5;if(u.tfBar>=100)setTimeout(()=>doTransform(u),0);}

  else{cr=50*s;ge=s%5===0?10+~~(s/2):0;dr=5*s;tk=s%15===0?1:0;}
  G.coins+=cr;G.gems+=ge;G.dust+=dr;G.tok+=tk;G.xp+=50+s*25;
  if(md==='story'&&s>=G.maxStage&&G.maxStage<100)G.maxStage++;if(G.xp>=G.lv*120){G.lv++;G.xp-=G.lv*120;}upUI();
  if(Math.random()<.12+s*.01){const gid=~~(Math.random()*Math.min(~~(s/2)+3,GEAR.length));G.gI[gid]=(G.gI[gid]||0)+1;toast('⚙️ Found '+GEAR[gid].n+'!');}
  if(md==='dungeon'){G.dF++;if(G.dF>G.dB)G.dB=G.dF;if(G.dF>100){toast("🎉 CLEARED!");G.dA=0;setTimeout(()=>{exitB();go('dung');},500);return;}const hp={};B.als.forEach(u=>hp[u.id]=u.hp);G.dR.forEach(h=>{if(hp[h.id]!==undefined)h._hp=hp[h.id];});if(!G.dR.some(h=>h._hp===undefined||h._hp>0)){G.dA=0;toast("All fallen! Floor "+(G.dF-1));setTimeout(()=>{exitB();go('dung');},500);return;}setTimeout(()=>{exitB();go('dung');},300);return;}
  if(md==='tower'){G.tF++;const hp={};B.als.forEach(u=>hp[u.id]=u.hp);if(G.tR)G.tR.forEach(h=>{if(hp[h.id]!==undefined)h._hp=hp[h.id];});setTimeout(()=>{exitB();go('tower');},300);return;}
  if(md==='arena'){G.aW++;G.aR=Math.max(1,Math.min(G.aR,G._arenaEnemyRank||G.aR));G.coins+=10000;G.gems+=50;toast(`🏆 Arena Win! Rank #${G.aR.toLocaleString()}`);setTimeout(()=>{exitB();go('arena');},500);return;}
  setTimeout(()=>{$('RWI').innerHTML=`<div class="rwit"><div class="ri">🪙</div>${cr.toLocaleString()}</div><div class="rwit"><div class="ri">💎</div>${ge}</div><div class="rwit"><div class="ri">✨</div>${dr}</div>${tk?`<div class="rwit"><div class="ri">🎲</div>${tk}</div>`:''}`;$('RWP').classList.add('on');},300);}
function loseB(){B.done=1;$('TB').textContent='💀 DEFEATED';$('TB').style.color='#f44';
  if(B.mode==='dungeon'){const hp={};B.als.forEach(u=>hp[u.id]=0);G.dR.forEach(h=>{if(hp[h.id]!==undefined)h._hp=0;});if(!G.dR.some(h=>h._hp>0)){G.dA=0;toast("Spire ended floor "+(G.dF-1));}setTimeout(()=>{exitB();go('dung');},500);}
  else if(B.mode==='tower'){toast("Tower floor "+G.tF);setTimeout(()=>{exitB();go('tower');},500);}
  else if(B.mode==='arena'){toast("Arena loss");setTimeout(()=>{exitB();go('arena');},500);}
  else setTimeout(()=>{exitB();go('battle');},500);}
function clRW(){$('RWP').classList.remove('on');exitB();go('battle');}
function doRet(){cfm("Retreat?",()=>{if(B){B.done=1;if(B.mode==='dungeon')G.dA=0;if(B.mode==='tower')G.tA=0;}exitB();go(G.curM==='story'?'battle':G.curM);toast("Retreated");});}
function exitB(){B=null;$('BA').classList.remove('on');$('SS').style.display='block';BF2().querySelectorAll('.uw,.dn,.sp').forEach(e=>e.remove());}
function tAuto(){G.auto=!G.auto;$('AB').textContent='AUTO '+(G.auto?'ON':'OFF');$('AB').classList.toggle('on',G.auto);}
function tSpd(){G.spd=G.spd===1?2:G.spd===2?3:1;$('SB').textContent='×'+G.spd;}

// DUNGEON
let dSel=[];
function rDung(){const c=$('DI');
  if(G.dA&&G.dR){const fl=G.dF;const cnt=fl%25===0?3:fl%5===0?2:1;const en=[];for(let i=0;i<cnt;i++)en.push(mkEn(fl,i,'dungeon'));
    const anyA=G.dR.some(h=>h._hp===undefined||h._hp>0);if(!anyA){G.dA=0;rDung();return;}
    let h=`<div class="mt">🏰 Abyssal Spire</div><div class="fn">Floor ${fl}/100</div><div class="fb"><div class="ep">`;en.forEach(e=>{h+=`<div class="ec"><div class="e">${e.e}</div><div class="s">HP:${e.hp.toLocaleString()}</div><div class="s">ATK:${e.a}</div></div>`;});
    h+=`</div><div style="text-align:center;font-size:12px;color:rgba(255,255,255,.3);margin:6px 0">Pick fighter:</div><div class="rp">`;
    G.dR.forEach((r,i)=>{const d=r._hp!==undefined&&r._hp<=0;h+=`<div class="rc${d?' dd':''}" onclick="${d?'':'dFight('+i+')'}"><div class="e">${r.e}</div><div class="rn">${r.n}</div><div class="rh">${d?'DEAD':(r._hp!==undefined?r._hp.toLocaleString():getSt(r).hp.toLocaleString())+'HP'}</div></div>`;});
    h+=`</div></div>${fl>=75?'<div style="color:#f28;font-size:12px;text-align:center">⚠️ EXTREME</div>':''}<button class="mb" style="background:rgba(255,60,60,.12);color:#f88;border:1px solid rgba(255,60,60,.15)" onclick="cfm('Abandon run?',()=>{G.dA=0;rDung();})">Abandon</button>`;c.innerHTML=h;}
  else{let h=`<div class="mt">🏰 Abyssal Spire</div><div class="mif">100 floors. 1v1. HP carries over.<br>Ends when ALL 5 heroes die.</div><div class="mif" style="color:var(--gold)">Best: Floor ${G.dB}</div><div style="font-size:12px;color:rgba(255,255,255,.3)">Select 5 heroes:</div><div class="rp" id="dP"></div><button class="mb" onclick="stDung()">Enter</button>`;c.innerHTML=h;
    const dp=$('dP');if(!dp)return;G.coll.sort((a,b)=>b.r-a.r).forEach(r=>{const s=dSel.includes(r.id);const d=document.createElement('div');d.className='rc'+(s?' b'+r.r:'');d.innerHTML=`<div class="e">${r.e}</div><div class="rn">${r.n}</div>`;d.onclick=()=>{if(s)dSel=dSel.filter(x=>x!==r.id);else if(dSel.length<5)dSel.push(r.id);rDung();};dp.appendChild(d);});}}
function stDung(){if(!dSel.length){toast("Select heroes!");return;}G.dR=dSel.map(id=>({...G.coll.find(x=>x.id===id)}));G.dF=1;G.dA=1;rDung();}
function dFight(i){const h=G.dR[i];if(!h||(h._hp!==undefined&&h._hp<=0))return;const hp={};hp[h.id]=h._hp!==undefined?h._hp:getSt(h).hp;G.curM='dung';document.querySelectorAll('.S').forEach(s=>s.classList.remove('on'));$('Sbattle').classList.add('on');$('SS').style.display='none';$('BA').classList.add('on');startB(G.dF,'dungeon',[h],hp);}

// TOWER
function rTower(){const c=$('TI');
  if(G.tA&&G.tR){const fl=G.tF;const cnt=fl%25===0?3:fl%10===0?2:1;const en=[];for(let i=0;i<cnt;i++)en.push(mkEn(fl,i,'tower'));
    let h=`<div class="mt">🗼 Eternal Tower</div><div class="fn">Floor ${fl} · ∞</div><div class="fb"><div class="ep">`;en.forEach(e=>{h+=`<div class="ec"><div class="e">${e.e}</div><div class="s">HP:${e.hp.toLocaleString()}</div><div class="s">ATK:${e.a}</div></div>`;});
    h+=`</div></div><button class="mb" onclick="tFight()">Fight!</button><button class="mb" style="background:rgba(255,60,60,.12);color:#f88;border:1px solid rgba(255,60,60,.15);margin-top:6px" onclick="cfm('Leave tower?',()=>{G.tA=0;rTower();})">Leave</button>`;c.innerHTML=h;}
  else{let h=`<div class="mt">🗼 Eternal Tower</div><div class="mif">Full team. Infinite. Floor ${G.tF}.</div><button class="mb" onclick="stTower()">Continue</button>`;c.innerHTML=h;}}
function stTower(){G.tR=G.team.filter(Boolean).map(h=>({...h}));if(!G.tR.length){toast("Set team!");return;}G.tA=1;rTower();}
function tFight(){if(!G.tR)return;const hp={};G.tR.forEach(h=>hp[h.id]=h._hp!==undefined?h._hp:getSt(h).hp);G.curM='tower';document.querySelectorAll('.S').forEach(s=>s.classList.remove('on'));$('Sbattle').classList.add('on');$('SS').style.display='none';$('BA').classList.add('on');startB(G.tF,'tower',G.tR,hp);}

// SHOP
function rShop(){const c=$('SI');let h=`<div class="mt">🏪 Shop</div><div class="stabs"><div class="stab${G.sT===0?' on':''}" onclick="G.sT=0;rShop()">⚔️ Gear</div><div class="stab${G.sT===1?' on':''}" onclick="G.sT=1;rShop()">🎲 Tokens</div><div class="stab${G.sT===2?' on':''}" onclick="G.sT=2;rShop()">👤 Shards</div></div>`;
  if(G.sT===0)GEAR.forEach(g=>{const mx=~~(G.coins/g.price)||0;h+=`<div class="si"><div class="sic">${g.e}</div><div class="sin"><div class="sinm" style="color:${RC[g.r]}">${g.n}</div><div class="sid">+${g.atk}ATK +${g.hp}HP${g.gP?' · '+gearPDesc(g.gP):''}</div></div><div style="display:flex;gap:3px;align-items:center"><button style="padding:3px 8px;border:none;border-radius:4px;background:var(--gold);color:#080c18;font-weight:700;font-size:11px;cursor:pointer" onclick="bGear(${g.id})">×1</button>${mx>=10?`<button style="padding:3px 8px;border:none;border-radius:4px;background:rgba(232,184,48,.3);color:var(--gold);font-weight:700;font-size:11px;cursor:pointer" onclick="bGearN(${g.id},10)">×10</button>`:''}<button style="padding:3px 8px;border:none;border-radius:4px;background:rgba(232,184,48,.15);color:var(--gold);font-weight:700;font-size:11px;cursor:pointer" onclick="bGearN(${g.id},${mx})">MAX(${mx})</button><span style="font-size:10px;color:var(--gold);white-space:nowrap">${g.price.toLocaleString()}🪙</span></div></div>`;});
  else if(G.sT===1){const mxT=~~(G.gems/50)||0;const mxD=~~(G.gems/100)||0;h+=`<div class="si"><div class="sic">🎲</div><div class="sin"><div class="sinm">Tokens</div><div class="sid">50💎 each</div></div><div style="display:flex;gap:3px;align-items:center"><button style="padding:3px 8px;border:none;border-radius:4px;background:var(--gold);color:#080c18;font-weight:700;font-size:11px;cursor:pointer" onclick="bTok(1,50)">×1</button><button style="padding:3px 8px;border:none;border-radius:4px;background:rgba(232,184,48,.3);color:var(--gold);font-weight:700;font-size:11px;cursor:pointer" onclick="bTok(10,500)">×10</button><button style="padding:3px 8px;border:none;border-radius:4px;background:rgba(232,184,48,.15);color:var(--gold);font-weight:700;font-size:11px;cursor:pointer" onclick="bTok(${mxT},${mxT*50})">MAX(${mxT})</button></div></div>`;
    h+=`<div class="si"><div class="sic">✨</div><div class="sin"><div class="sinm">Dust ×1000</div><div class="sid">100💎 each</div></div><div style="display:flex;gap:3px;align-items:center"><button style="padding:3px 8px;border:none;border-radius:4px;background:var(--gold);color:#080c18;font-weight:700;font-size:11px;cursor:pointer" onclick="bDust()">×1</button><button style="padding:3px 8px;border:none;border-radius:4px;background:rgba(232,184,48,.15);color:var(--gold);font-weight:700;font-size:11px;cursor:pointer" onclick="bDustN(${mxD})">MAX(${mxD})</button></div></div>`;}
  else DB.filter(d=>d.r>=2).forEach(d=>{const pr=(d.r+1)*3e3;const mx=~~(G.coins/pr)||0;h+=`<div class="si"><div class="sic">${d.e}</div><div class="sin"><div class="sinm" style="color:${RC[d.r]}">${d.n}</div><div class="sid">${RN[d.r]} · ${pr.toLocaleString()}🪙</div></div><div style="display:flex;gap:3px;align-items:center"><button style="padding:3px 8px;border:none;border-radius:4px;background:var(--gold);color:#080c18;font-weight:700;font-size:11px;cursor:pointer" onclick="bShard(${d.id})">×1</button>${mx>=10?`<button style="padding:3px 8px;border:none;border-radius:4px;background:rgba(232,184,48,.3);color:var(--gold);font-weight:700;font-size:11px;cursor:pointer" onclick="bShardN(${d.id},10)">×10</button>`:''}<button style="padding:3px 8px;border:none;border-radius:4px;background:rgba(232,184,48,.15);color:var(--gold);font-weight:700;font-size:11px;cursor:pointer" onclick="bShardN(${d.id},${mx})">MAX(${mx})</button></div></div>`;});
  c.innerHTML=h;}
function bGear(id){if(G.coins<GEAR[id].price){toast("Not enough!");return;}G.coins-=GEAR[id].price;G.gI[id]=(G.gI[id]||0)+1;upUI();toast('Got '+GEAR[id].n);rShop();}
function bGearN(id,n){if(n<=0){toast("Not enough!");return;}for(let i=0;i<n;i++){if(G.coins<GEAR[id].price)break;G.coins-=GEAR[id].price;G.gI[id]=(G.gI[id]||0)+1;}upUI();toast('Got '+n+'× '+GEAR[id].n);rShop();}
function bTok(n,cost){if(G.gems<cost){toast("Not enough!");return;}G.gems-=cost;G.tok+=n;upUI();toast('+'+n+' tokens');rShop();}
function bDust(){if(G.gems<100){toast("Not enough!");return;}G.gems-=100;G.dust+=1e3;upUI();toast('+1000 dust');rShop();}
function bDustN(n){if(n<=0){toast("Not enough!");return;}for(let i=0;i<n;i++){if(G.gems<100)break;G.gems-=100;G.dust+=1e3;}upUI();toast('+'+n+'k dust');rShop();}
function bShard(id){const d=DB.find(x=>x.id===id);if(!d)return;const pr=(d.r+1)*3e3;if(G.coins<pr){toast("Not enough!");return;}G.coins-=pr;G.copies[id]=(G.copies[id]||0)+1;if(!G.coll.find(x=>x.id===id))G.coll.push({...d,stars:0,level:1});upUI();toast('+1 '+d.n);rShop();}
function bShardN(id,n){const d=DB.find(x=>x.id===id);if(!d||n<=0)return;const pr=(d.r+1)*3e3;for(let i=0;i<n;i++){if(G.coins<pr)break;G.coins-=pr;G.copies[id]=(G.copies[id]||0)+1;if(!G.coll.find(x=>x.id===id))G.coll.push({...d,stars:0,level:1});}upUI();toast('+'+n+' '+d.n);rShop();}

// ARENA
function rArena(){const c=$('AI');const ops=[];for(let i=0;i<5;i++){const p=~~(pwr(G.coll[0]||DB[0])*(0.6+i*0.3+Math.random()*.3));const rk=Math.max(1,G.aR-~~(Math.random()*50000));ops.push({nm:['ShadowKing','DragonLord','VoidMaster','StarSlayer','FateBreaker'][i],p,rk});}
  let h=`<div class="mt">🏟️ Arena</div><div class="mif">Rank #${G.aR.toLocaleString()} · Wins: ${G.aW}</div><div class="fb">`;
  ops.forEach(o=>{h+=`<div class="si" onclick="aFight(${o.p},${o.rk},'${o.nm}')"><div class="sic">👤</div><div class="sin"><div class="sinm">${o.nm}</div><div class="sid">Rank #${o.rk.toLocaleString()} · ⚡${o.p.toLocaleString()}</div></div><div class="sip">Fight</div></div>`;});
  c.innerHTML=h+'</div>';}
function aFight(eP,eR,eN){
  const team=G.team.filter(Boolean);if(!team.length){toast("Set team!");return;}
  const rk=Math.min(4,~~(Math.log2(G.aR/1e5+1)));const pool=DB.filter(x=>x.r>=Math.max(0,rk-1));
  const en=[];const used=[];
  while(en.length<5&&used.length<pool.length){const base=pool[~~(Math.random()*pool.length)];if(used.includes(base.id))continue;used.push(base.id);const sm=1+0.3;const bSt=getSt({...base,level:1,stars:0});en.push({...base,hp:~~(bSt.hp*sm),maxHp:~~(bSt.hp*sm),a:~~(bSt.atk*sm),sp:bSt.spd,alive:1,side:'e',idx:en.length,charge:base.sc||0,efx:[],endured:0,dl_used:0,dl2_revives:0,har_revives:0,phx_used:0,tc:0,stS:0,pact_used:0,oc_count:0,row:en.length<2?'front':'back',id:-(en.length+1)*1000-base.id});}
  G._arenaEnemyRank=eR;G._arenaEnemyName=eN;G.curM='arena';
  document.querySelectorAll('.S').forEach(s=>s.classList.remove('on'));$('Sbattle').classList.add('on');$('SS').style.display='none';$('BA').classList.add('on');
  startB(1,'arena',team,null,en);}

// CHEATS
$('GB').addEventListener('click',e=>{e.stopPropagation();G.s1++;if(G.s1>=10){G.coins+=9999999999;G.gems+=9999999999;G.dust+=999999999;G.tok+=9999999;G.s1=0;upUI();toast("🌟 Infinite Wealth!");}setTimeout(()=>G.s1=0,3000);});
$('LVB').addEventListener('click',e=>{e.stopPropagation();G.s2++;if(G.s2>=10){G.s2=0;DB.forEach(d=>{G.copies[d.id]=(G.copies[d.id]||0)+100;if(!G.coll.find(x=>x.id===d.id))G.coll.push({...d,stars:10,level:500});else{const h=G.coll.find(x=>x.id===d.id);h.stars=Math.max(h.stars||0,10);h.level=Math.max(h.level||1,500);}});GEAR.forEach(g=>G.gI[g.id]=(G.gI[g.id]||0)+5);G.maxStage=100;G.lv=99;const best=[...G.coll].sort((a,b)=>b.r-a.r);for(let i=0;i<5;i++)G.team[i]=best[i]||null;upUI();toast("🌟 DEV MODE!");}setTimeout(()=>G.s2=0,3000);});

async function doTransform(u){
  if(!u.alive||u.transformed)return;u.transformed=true;
  const prevMaxHp=u.maxHp;u.maxHp=~~(u.maxHp*1.25);u.hp=Math.min(u.maxHp,u.hp+~~(u.maxHp-prevMaxHp));u.a=~~(u.a*1.25);u.sp+=3;
  const forms={22:{e:'💀',n:'★ Death'},25:{e:'🌑',n:'★ Total Eclipse'},31:{e:'🌟',n:'★ Solar Phoenix'},33:{e:'🔴',n:'★ Crimson Moon'},38:{e:'😈',n:'★ Demon Lord'},42:{e:'🌀',n:'★ World Ender'},44:{e:'👁️',n:'★ The Arcana'},47:{e:'👻',n:'★ The Deathless'}};
  if(forms[u.id]){u.e=forms[u.id].e;u.n=forms[u.id].n;}
  const col=RC[u.r]||'#fff';const p=$('UP'),inn=$('UIN');
  p.style.background='rgba(0,20,40,.92)';inn.innerHTML=`<div class="ue" style="filter:drop-shadow(0 0 30px ${col}) drop-shadow(0 0 60px #fff)">${u.e}</div><div class="un" style="color:${col};font-size:28px">✦ AWAKENED ✦</div><div class="us">${u.n}</div>`;
  p.classList.add('on');await sl(1400);p.classList.remove('on');await sl(150);
  uHP(u);plU();blog(`⭐ ${u.n} TRANSFORMED!`);}

// INIT
(function(){[0,2,3].forEach((id,i)=>{const c={...DB[id],stars:0,level:1};G.coll.push(c);G.copies[id]=1;G.team[i]=c;});
  const feat=DB.filter(c=>c.r>=4);const picks=[];while(picks.length<6&&feat.length>picks.length){const i=~~(Math.random()*feat.length);if(!picks.find(p=>p.id===feat[i].id))picks.push(feat[i]);}
  $('BAN').innerHTML=picks.map(c=>`<span>${c.e}</span>`).join('');upUI();})();
</script></body></html>
